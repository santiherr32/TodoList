<div class="min-h-screen bg-gray-50 dark:bg-gray-950 transition-colors duration-300">
  <!-- Header -->
  <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-xl font-bold text-gray-900 dark:text-white tracking-tight">Todo List App</h1>

      <!-- Theme toggle -->
      <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-lg p-1 gap-0.5">
        @for (option of themeOptions; track option.value) {
          <button
            (click)="setTheme(option.value)"
            [title]="option.label"
            class="p-1.5 rounded-md transition-colors"
            [class]="
              themeService.theme() === option.value
                ? 'bg-white dark:bg-gray-700 text-primary-500 shadow-sm'
                : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'
            "
          >
            <svg [lucideIcon]="option.icon" size="15"></svg>
          </button>
        }
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <router-outlet />
  </main>
</div>
